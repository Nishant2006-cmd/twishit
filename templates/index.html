  <div class="container">
    <h2>💌 Create Your Letter</h2>

    <!-- Sticker Panel -->
    <div class="sticker-panel">
      <span class="sticker">❤️</span>
      <span class="sticker">⚓</span>
      <span class="sticker">✨</span>
      <span class="sticker">🐥</span>
      <span class="sticker">🌹</span>
      <span class="sticker">😘</span>
      <span class="sticker">🌊</span>
      <span class="sticker">🙂‍↕️</span>
      <span class="sticker">👪</span>
      <span class="sticker">⛵</span>
    </div>

    <!-- Textarea -->
    <textarea class="textbox1" id="letterBox" placeholder="Enter your feelings here..."></textarea>

    <!-- Next Button -->
    <button id="nextbtn">SAVE</button>
    <footer>Made with ❤️ by Nishant</footer>
  </div>

  <script>
    const letterBox = document.getElementById("letterBox");
    const stickers = document.querySelectorAll(".sticker");

    stickers.forEach(sticker => {
      sticker.addEventListener("click", () => {
        letterBox.value += sticker.textContent; // add sticker to text
      });
    });
    const themeBtn1 = document.getElementById("themebtn1");
    themeBtn1.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      document.body.classList.toggle("light");
    });
    const themeBtn2 = document.getElementById("themebtn2");
    themeBtn2.addEventListener("click", () => {
      document.body.classList.toggle("dark2");
      document.body.classList.toggle("light");
    });

    const themeBtn3 = document.getElementById("themebtn3");
    themeBtn3.addEventListener("click", () => {
      document.body.classList.toggle("dark3");
      document.body.classList.toggle("light");
    });

    const themeBtn4 = document.getElementById("themebtn4");
    themeBtn4.addEventListener("click", () => {
      document.body.classList.toggle("dark4");
      document.body.classList.toggle("light");
    });

    const themeBtn5 = document.getElementById("themebtn5");
    themeBtn5.addEventListener("click", () => {
      document.body.classList.toggle("dark5");
      document.body.classList.toggle("light");
    });


const saveBtn = document.getElementById("nextbtn");
  saveBtn.addEventListener("click", () => {
    const letterContent = letterBox.value;

    fetch("/save_letter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: letterContent })
    })
    .then(res => res.json())
    .then(data => {
      alert("Letter saved! View it at: " + data.url);
      window.location.href = data.url; // redirect to view page
    });
  });

  </script>
