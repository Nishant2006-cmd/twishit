      transition: transform 0.2s;

    .sticker:hover {

  <ul>
    {% for letter in letters %}
      <li>
        <a href="{{ url_for('view_letter', letter_id=letter['_id']|string) }}">
    {{ letter.content[:50] }}...
</a>
<form action="{{ url_for('delete_letter', letter_id=letter['_id']|string) }}" method="POST" style="display:inline;">
        <button id ="delete" type="submit" style="color:red;">Delete</button>
      </form>

      </li>
    {% endfor %}
